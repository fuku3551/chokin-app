<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>家計ノート</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
:root{--bg1:#faf8f5;--bg2:#f0ebe4;--bg3:#e8e0d5;--brown:#5c4a32;--brownL:#8b7555;--brownLL:#9b8b78;--brownBg:rgba(139,117,85,0.06);--green:#2d6a4f;--greenD:#1b4332;--greenBg:rgba(45,106,79,0.06);--red:#c1121f;--expCol:#8b5e3c;--card:rgba(255,255,255,0.65);--border:rgba(139,117,85,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2),var(--bg3));color:#3d3228;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding-bottom:40px;position:relative}
.hdr{text-align:center;padding:32px 20px 12px;position:relative;z-index:1}
.hdr h1{font-size:1.6rem;font-weight:700;color:var(--brown);letter-spacing:0.15em}
.hdr p{font-size:0.8rem;color:var(--brownLL);margin-top:4px;letter-spacing:0.1em}
.tabs{display:flex;margin:8px 16px 12px;border-radius:10px;overflow:hidden;border:1px solid rgba(139,117,85,0.15);background:rgba(255,255,255,0.5)}
.tabs button{flex:1;padding:10px 0;border:none;font-size:0.85rem;cursor:pointer;font-family:inherit}
.tabs .on{background:rgba(92,74,50,0.12);color:var(--brown);font-weight:700}
.tabs .off{background:transparent;color:var(--brownLL);font-weight:500}
.mnav{display:flex;align-items:center;justify-content:center;gap:20px;padding:8px 20px;position:relative;z-index:1}
.nbtn{background:var(--brownBg);border:1px solid rgba(139,117,85,0.2);border-radius:8px;width:40px;height:40px;font-size:1rem;color:var(--brown);cursor:pointer;display:flex;align-items:center;justify-content:center}
.actbar{display:flex;justify-content:center;gap:10px;padding:0 20px 12px;position:relative;z-index:1}
.actbtn{border-radius:8px;padding:8px 16px;font-size:0.8rem;cursor:pointer;font-weight:600;font-family:inherit;border:1px solid}
.actg{background:rgba(45,106,79,0.1);border-color:rgba(45,106,79,0.2);color:var(--green)}
.actb{background:rgba(139,117,85,0.1);border-color:rgba(139,117,85,0.2);color:var(--brownL)}
.main{padding:0 16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}
.card{background:var(--card);backdrop-filter:blur(8px);border-radius:16px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(92,74,50,0.04)}
.savcard{background:linear-gradient(135deg,rgba(45,106,79,0.08),rgba(255,255,255,0.7));border:1px solid rgba(45,106,79,0.15)}
.shead{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(139,117,85,0.1)}
.shead .icon{font-size:1.2rem}
.shead input{font-size:0.95rem;font-weight:700;color:var(--brown);letter-spacing:0.05em;border:none;border-bottom:1px dashed rgba(139,117,85,0.2);background:transparent;outline:none;font-family:inherit;padding:2px 4px;flex:1;min-width:0}
.shead .badge{margin-left:8px;font-size:0.7rem;font-weight:600;flex-shrink:0}
.items{display:flex;flex-direction:column;gap:8px}
.irow{display:flex;align-items:center;gap:5px;transition:opacity 0.2s}
.irow.done{opacity:0.5}
.delbtn{width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.6rem;background:rgba(193,18,31,0.08);color:var(--red);flex-shrink:0}
.delbtn:disabled{opacity:0.3;cursor:default}
.nin{flex:1;font-size:0.82rem;color:var(--brown);border:1px solid rgba(139,117,85,0.18);border-radius:6px;padding:5px 8px;background:rgba(255,255,255,0.7);outline:none;font-family:inherit;min-width:0}
.amtw{display:flex;align-items:center;gap:2px;background:var(--brownBg);border-radius:8px;padding:4px 6px;border:1px solid rgba(139,117,85,0.1);width:85px;min-width:85px;flex-shrink:0}
.yen{font-size:0.85rem;color:var(--brownLL);font-weight:600}
.ain{width:100%;border:none;background:transparent;font-size:0.95rem;color:#3d3228;font-family:'Noto Sans JP',sans-serif;font-weight:600;outline:none;text-align:right;padding:2px 0}
.chk{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0}
.chk.on{background:rgba(45,106,79,0.15);color:var(--green)}
.chk.off{background:rgba(139,117,85,0.08);color:#c8bdb0}
.addbtn{width:100%;padding:8px 0;margin-top:10px;border-radius:8px;border:1px dashed rgba(139,117,85,0.25);background:rgba(139,117,85,0.04);font-size:0.8rem;cursor:pointer;font-family:inherit;font-weight:500;color:var(--brownL)}
.addbtn:disabled{color:#ccc;cursor:default}
.sfoot{margin-top:14px;padding-top:12px;border-top:1px dashed rgba(139,117,85,0.2);display:flex;flex-direction:column;gap:6px}
.totrow{display:flex;justify-content:space-between;align-items:center}
.balrow{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--greenBg);border-radius:8px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sitem{display:flex;flex-direction:column;gap:4px;padding:10px 12px;background:rgba(139,117,85,0.05);border-radius:10px}
.pbar{height:8px;background:rgba(139,117,85,0.1);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#2d6a4f,#52b788);border-radius:4px;transition:width 0.4s}
.memo{width:100%;min-height:80px;border:1px solid rgba(139,117,85,0.15);border-radius:10px;padding:12px;font-size:0.85rem;font-family:'Noto Sans JP',sans-serif;color:#3d3228;background:rgba(255,255,255,0.5);resize:vertical;outline:none;box-sizing:border-box}
.histpanel{margin:0 16px 16px;background:rgba(255,255,255,0.7);backdrop-filter:blur(8px);border-radius:16px;padding:20px;border:1px solid rgba(139,117,85,0.15);position:relative;z-index:1}
.hitem{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(139,117,85,0.05);border-radius:8px;margin-top:8px}
.footer{text-align:center;padding:24px 20px;position:relative;z-index:1}
.footer p{font-size:0.7rem;color:#b8a898}
.annwrap{position:relative;z-index:1;padding:0 8px}
.anav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.anav button{background:rgba(139,117,85,0.1);border:1px solid rgba(139,117,85,0.2);border-radius:8px;width:36px;height:36px;font-size:0.9rem;color:var(--brown);cursor:pointer;display:flex;align-items:center;justify-content:center}
.atwrap{overflow-x:auto;overflow-y:auto;max-height:65vh;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.7);-webkit-overflow-scrolling:touch}
.at{border-collapse:collapse;min-width:820px;width:100%}
.at th,.at td{padding:6px 4px;font-size:0.65rem;text-align:right;border-bottom:1px solid rgba(139,117,85,0.08);white-space:nowrap}
.at thead th{font-weight:700;color:var(--brown);text-align:center;background:var(--brownBg);position:sticky;top:0;z-index:2}
.at .lc{text-align:left;font-weight:600;color:var(--brown);position:sticky;left:0;background:var(--bg1);z-index:1;min-width:70px;padding-left:8px}
.at .slc{text-align:left;font-weight:400;color:var(--brownL);position:sticky;left:0;background:var(--bg1);z-index:1;min-width:70px;padding-left:14px;font-size:0.6rem}
.at .tc{font-weight:700;background:rgba(139,117,85,0.04)}
.at .tlc{font-weight:700;background:rgba(139,117,85,0.04);text-align:left;position:sticky;left:0;z-index:1;min-width:70px;padding-left:8px}
.asgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.asitem{background:rgba(255,255,255,0.7);border-radius:12px;padding:12px 14px;border:1px solid rgba(139,117,85,0.1)}
.hidden{display:none}
</style>
</head>

<script>
// === Pure Vanilla JS Budget App ===
(function(){
  var SKEY = "kakeibo-v4";
  var DEFS = {
    income:{t:"① 収入",ic:"💰",mx:8,pr:["本業","副業","事業収入","その他"]},
    deductions:{t:"② 引き落とし項目",ic:"🏦",mx:15,pr:["家賃","電気代","ガス代","水道代","通信費","保険料","ローン","サブスク","税金","その他"]},
    transfers:{t:"③ 振込項目",ic:"📤",mx:10,pr:["振込先A","振込先B","振込先C","振込先D","振込先E","振込先F"]},
    living:{t:"④ 生活費項目",ic:"🛒",mx:12,pr:["食費","日用品","交通費","医療費","衣服費","交際費","趣味","雑費"]},
    specialSavings:{t:"⑤ 特別必須貯金",ic:"🔒",mx:8,pr:["車検積立","冠婚葬祭","旅行積立","緊急予備費"]}
  };
  var SKS = ["income","deductions","transfers","living","specialSavings"];

  function pa(v){var n=parseInt(String(v||"").replace(/[^0-9]/g,""),10);return isNaN(n)?0:n;}
  function fmt(n){return "¥"+(Number(n)||0).toLocaleString();}
  function fmtS(n){var v=Number(n)||0;if(v===0)return"-";if(Math.abs(v)>=10000)return(v/10000).toFixed(v%10000===0?0:1)+"万";return v.toLocaleString();}
  function mk(y,m){return y+"-"+String(m).padStart(2,"0");}
  function mkItem(name,sk){var o={name:name||"",amount:""};if(sk!=="income")o.checked=false;return o;}

  function freshMonth(){
    var sec={};
    SKS.forEach(function(sk){sec[sk]={title:DEFS[sk].t,icon:DEFS[sk].ic,items:DEFS[sk].pr.map(function(n){return mkItem(n,sk);})};});
    return{sections:sec,savingsAmount:"",savingsChecked:false,savingsTitle:"⑥ 貯金",memo:""};
  }

  function ensure(d){
    if(!d||!d.sections)return freshMonth();
    var m={sections:{},savingsAmount:String(d.savingsAmount||""),savingsChecked:!!d.savingsChecked,savingsTitle:String(d.savingsTitle||"⑥ 貯金"),memo:String(d.memo||"")};
    SKS.forEach(function(sk){
      var s=d.sections[sk];
      if(!s||!s.items||!s.items.length){
        m.sections[sk]={title:DEFS[sk].t,icon:DEFS[sk].ic,items:DEFS[sk].pr.map(function(n){return mkItem(n,sk);})};
      }else{
        m.sections[sk]={title:String(s.title||DEFS[sk].t),icon:DEFS[sk].ic,items:s.items.map(function(it){
          var o={name:String(it.name||""),amount:String(it.amount||"")};
          if(sk!=="income")o.checked=!!it.checked;
          return o;
        })};
      }
    });
    return m;
  }

  function loadData(){try{var d=localStorage.getItem(SKEY);return d?JSON.parse(d):null;}catch(e){return null;}}
  function saveData(d){try{localStorage.setItem(SKEY,JSON.stringify(d));}catch(e){}}

  // State
  var now=new Date();
  var state={
    cY:now.getFullYear(),cM:now.getMonth()+1,
    months:{},cumBase:"",
    tab:"monthly",hist:false,aY:now.getFullYear()
  };

  // Load
  var saved=loadData();
  if(saved&&saved.months){
    var safe={};
    Object.keys(saved.months).forEach(function(k){safe[k]=ensure(saved.months[k]);});
    state.months=safe;
    if(saved.cumBase!==undefined)state.cumBase=String(saved.cumBase||"");
  }

  function persist(){saveData({months:state.months,cumBase:state.cumBase});}

  function getMD(){
    var k=mk(state.cY,state.cM);
    if(state.months[k])return ensure(state.months[k]);
    // carry forward
    var ks=Object.keys(state.months).filter(function(x){return x<k;}).sort().reverse();
    if(ks.length===0)return freshMonth();
    var p=ensure(state.months[ks[0]]);
    var c=freshMonth();
    c.savingsTitle=p.savingsTitle||"⑥ 貯金";
    SKS.forEach(function(sk){
      var ps=p.sections[sk];
      if(ps&&ps.items){
        c.sections[sk]={title:ps.title||DEFS[sk].t,icon:DEFS[sk].ic,items:ps.items.map(function(it){return mkItem(it.name,sk);})};
      }
    });
    return c;
  }

  function setMD(md){state.months[mk(state.cY,state.cM)]=md;persist();render();}

  function secT(md,sk){return(md.sections[sk]?md.sections[sk].items:[]).reduce(function(s,it){return s+pa(it.amount);},0);}

  // === RENDER ===
  function render(){
    var app=document.getElementById("app");
    var md=getMD();
    var k=mk(state.cY,state.cM);
    var iT=secT(md,"income"),dT=secT(md,"deductions"),trT=secT(md,"transfers"),lT=secT(md,"living"),spT=secT(md,"specialSavings");
    var mSav=pa(md.savingsAmount);
    var aDed=iT-dT,aTr=aDed-trT,aLiv=aTr-lT,aSp=aLiv-spT,fin=aSp-mSav;
    var totalExp=dT+trT+lT+spT;

    // Cumulative savings
    var cumKeys=Object.keys(state.months).sort();
    var cumBase=pa(state.cumBase);
    var cumMap={};var cc=cumBase;
    cumKeys.forEach(function(ck){cc+=pa(state.months[ck].savingsAmount);cumMap[ck]=cc;});
    var curCum=cumMap[k]||cumBase;

    var html='<header class="hdr"><h1>家計ノート</h1><p>収支管理 ＆ 貯金トラッカー</p></header>';

    // Tabs
    html+='<div class="tabs"><button class="'+(state.tab==="monthly"?"on":"off")+'" onclick="app.setTab(\'monthly\')">📅 月別入力</button>';
    html+='<button class="'+(state.tab==="annual"?"on":"off")+'" onclick="app.setTab(\'annual\')">📊 年間一覧</button></div>';

    if(state.tab==="annual"){
      html+=renderAnnual(cumMap);
    }else{
      // Month nav
      html+='<div class="mnav"><button class="nbtn" onclick="app.pm()">◀</button>';
      html+='<div style="text-align:center"><div style="font-size:0.75rem;color:#9b8b78">'+state.cY+'年</div>';
      html+='<div style="font-size:1.5rem;font-weight:700;color:#5c4a32">'+state.cM+'月</div></div>';
      html+='<button class="nbtn" onclick="app.nm()">▶</button></div>';

      // Action bar
      html+='<div class="actbar"><button class="actbtn actg" onclick="app.togHist()">'+(state.hist?"✕ 閉じる":"📊 履歴・累計")+'</button>';
      html+='<button class="actbtn actb" onclick="app.reset()">🔄 リセット</button></div>';

      // History
      if(state.hist){
        html+='<div class="histpanel"><h3 style="margin:0 0 16px;font-size:1rem;color:#5c4a32">📊 貯金履歴 ＆ 累計</h3>';
        html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px dashed rgba(139,117,85,0.2)">';
        html+='<label style="font-size:0.8rem;color:#8b7555">貯金開始額</label>';
        html+='<div class="amtw"><span class="yen">¥</span><input class="ain" type="text" inputmode="numeric" value="'+esc(state.cumBase)+'" onchange="app.setCB(this.value)"></div></div>';
        var hks=Object.keys(state.months).sort().reverse();
        if(hks.length===0){html+='<p style="text-align:center;color:#9b8b78;font-size:0.85rem">まだデータがありません</p>';}
        else{hks.forEach(function(hk){
          var sv=pa(state.months[hk].savingsAmount);var cm=cumMap[hk]||0;var p=hk.split("-");
          html+='<div class="hitem"><span style="font-weight:600;font-size:0.85rem;color:#5c4a32">'+p[0]+'年'+parseInt(p[1])+'月</span>';
          html+='<div style="text-align:right"><div style="font-size:0.8rem;color:#8b7555">月: '+fmt(sv)+'</div>';
          html+='<div style="font-size:0.85rem;font-weight:700;color:#2d6a4f">累計: '+fmt(cm)+'</div></div></div>';
        });}
        html+='</div>';
      }

      // Main sections
      html+='<main class="main">';
      html+=renderSec(md,"income",0,"",iT);
      html+=renderSec(md,"deductions",aDed,"収入 − 引落 残高",dT);
      html+=renderSec(md,"transfers",aTr,"残高 − 振込 残高",trT);
      html+=renderSec(md,"living",aLiv,"残高 − 生活費 残高",lT);
      html+=renderSec(md,"specialSavings",aSp,"残高 − 特別貯金 残高",spT);

      // Savings
      html+='<div class="card savcard"><div class="shead"><span class="icon">🐷</span>';
      html+='<input value="'+esc(md.savingsTitle||"⑥ 貯金")+'" onchange="app.uSavTitle(this.value)"></div>';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px">';
      html+='<label style="font-size:0.85rem;font-weight:600;color:#2d6a4f">今月の貯金額</label>';
      html+='<div style="display:flex;align-items:center;gap:5px">';
      html+='<div class="amtw"><span class="yen">¥</span><input class="ain" style="font-size:1.1rem" type="text" inputmode="numeric" value="'+esc(md.savingsAmount)+'" onchange="app.uSav(this.value)"></div>';
      html+='<button class="chk '+(md.savingsChecked?"on":"off")+'" onclick="app.togSavChk()">'+(md.savingsChecked?"✅":"☐")+'</button></div></div>';
      html+='<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">';
      html+='<div style="display:flex;justify-content:space-between;font-size:0.9rem"><span>今月の貯金</span><span style="color:#2d6a4f;font-weight:700">'+fmt(mSav)+'</span></div>';
      html+='<div style="display:flex;justify-content:space-between;font-size:0.9rem"><span>貯金累計</span><span style="color:#1b4332;font-weight:700;font-size:1.1rem">'+fmt(curCum)+'</span></div></div>';
      html+='<div class="sfoot"><div class="balrow"><span style="font-size:0.75rem;color:#6b8f71;font-weight:500">最終残高（貯金後）</span>';
      html+='<span style="font-size:1.15rem;font-weight:700;color:'+(fin>=0?"#2d6a4f":"#c1121f")+'">'+fmt(fin)+'</span></div></div></div>';

      // Summary
      html+='<div class="card"><h3 style="margin:0 0 16px;font-size:1rem;color:#5c4a32">📋 今月のまとめ</h3><div class="sgrid">';
      [{l:"総収入",v:iT,c:"#2d6a4f"},{l:"総支出",v:totalExp,c:"#8b5e3c"},{l:"貯金額",v:mSav,c:"#1b4332"},{l:"最終残高",v:fin,c:fin>=0?"#2d6a4f":"#c1121f"}].forEach(function(x){
        html+='<div class="sitem"><span style="font-size:0.75rem;color:#9b8b78">'+x.l+'</span><span style="font-size:1rem;font-weight:700;color:'+x.c+'">'+fmt(x.v)+'</span></div>';
      });
      html+='</div>';
      var pct=iT>0?Math.round(totalExp/iT*100):0;
      html+='<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#8b7555;margin-bottom:6px"><span>支出率</span><span>'+pct+'%</span></div>';
      html+='<div class="pbar"><div class="pfill" style="width:'+Math.min(100,iT>0?totalExp/iT*100:0)+'%"></div></div></div>';

      // Memo
      html+='<div class="card"><h3 style="margin:0 0 12px;font-size:1rem;color:#5c4a32">📝 メモ</h3>';
      html+='<textarea class="memo" placeholder="今月の振り返りやメモをここに..." onchange="app.uMemo(this.value)">'+esc(md.memo||"")+'</textarea></div>';

function esc(s){return String(s).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);}

function renderSec(md,sk,bal,bLbl,tot){
var sec=md.sections[sk];if(!sec)return””;
var isI=sk===“income”;
var cked=isI?0:sec.items.filter(function(x){return x.checked;}).length;
var hasAmt=isI?0:sec.items.filter(function(x){return pa(x.amount)>0;}).length;
var mx=DEFS[sk].mx;
var h=’<div class="card"><div class="shead"><span class="icon">’+sec.icon+’</span>’;
h+=’<input value="'+esc(sec.title)+'" onchange="app.uSecTitle(\''+sk+'\',this.value)">’;
if(!isI&&hasAmt>0){var col=cked===hasAmt?”#2d6a4f”:”#9b8b78”;h+=’<span class="badge" style="color:'+col+'">’+(cked===hasAmt?“✅ 完了”:cked+”/”+hasAmt)+’</span>’;}
h+=’</div><div class="items">’;
