const mkItem=(name,sk)=>{const o={name:name||””,amount:””};if(sk!==“income”)o.checked=false;return o};
const mkDefSec=()=>{const s={};Object.entries(DEFAULTS).forEach(([sk,d])=>{s[sk]={title:d.title,icon:d.icon,items:d.preset.map(n=>mkItem(n,sk))}});return s};

/* ═══ Main App ═══ */
function App(){
const now=new Date();
const[cY,sCY]=useState(now.getFullYear()),[cM,sCM]=useState(now.getMonth()+1);
const[all,sAll]=useState({}),[ok,sOk]=useState(false);
const[hist,sHist]=useState(false),[cumBase,sCB]=useState(””);
const[tab,sTab]=useState(“monthly”),[aY,sAY]=useState(now.getFullYear());
const mkey=mk(cY,cM);

useEffect(()=>{
const d=ld();
if(d&&d.months){try{const s={};Object.entries(d.months).forEach(([k,v])=>{s[k]=ensure(v)});sAll(s)}catch(e){sAll({})}if(d.cumBase!==undefined)sCB(String(d.cumBase||””))}
sOk(true);
},[]);

useEffect(()=>{if(ok)sv({months:all,cumBase})},[all,cumBase,ok]);

const carry=useCallback((ad,ck)=>{
const ks=Object.keys(ad).filter(k=>k<ck).sort().reverse();
if(ks.length===0)return fresh();
const p=ensure(ad[ks[0]]);
const c={sections:{},savingsAmount:””,savingsChecked:false,savingsTitle:p.savingsTitle||”\u2465 \u8caf\u91d1”,memo:””};
Object.keys(DEFAULTS).forEach(sk=>{
const ps=p.sections[sk];
if(ps&&Array.isArray(ps.items)){c.sections[sk]={title:ps.title||DEFAULTS[sk].title,icon:DEFAULTS[sk].icon,items:ps.items.map(it=>mkItem(it.name,sk))}}
else{c.sections[sk]={title:DEFAULTS[sk].title,icon:DEFAULTS[sk].icon,items:DEFAULTS[sk].preset.map(n=>mkItem(n,sk))}}
});return c;
},[]);

const mD=useMemo(()=>all[mkey]?ensure(all[mkey]):carry(all,mkey),[all,mkey,carry]);

const upd=useCallback(fn=>{sAll(p=>{const c=p[mkey]?ensure(p[mkey]):carry(p,mkey);const n=typeof fn===“function”?fn(c):fn;return Object.assign({},p,{[mkey]:n})})},[mkey,carry]);
const uI=useCallback((sk,i,f,v)=>{upd(p=>{const n=JSON.parse(JSON.stringify(p));if(n.sections[sk]&&n.sections[sk].items[i])n.sections[sk].items[i][f]=v;return n})},[upd]);
const addI=useCallback(sk=>{upd(p=>{const n=JSON.parse(JSON.stringify(p));if(!n.sections[sk]||n.sections[sk].items.length>=(DEFAULTS[sk]&&DEFAULTS[sk].max||20))return n;n.sections[sk].items.push(mkItem(””,sk));return n})},[upd]);
const rmI=useCallback((sk,i)=>{upd(p=>{const n=JSON.parse(JSON.stringify(p));if(!n.sections[sk]||n.sections[sk].items.length<=1)return n;n.sections[sk].items.splice(i,1);return n})},[upd]);

const sT=useCallback(sk=>(mD.sections[sk]&&mD.sections[sk].items||[]).reduce((s,it)=>s+pa(it.amount),0),[mD]);
const iT=sT(“income”),dT=sT(“deductions”),trT=sT(“transfers”),lT=sT(“living”),spT=sT(“specialSavings”);
